<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>星座テスト</title>
</head>
<body>
  <h1>あなたの星座情報</h1>

  <!-- 星座情報を表示する場所 -->
  <div id="result">読み込み中...</div>

  <!-- APIを呼んで表示するスクリプト -->
  <script>
  async function getHoroscope() {
    try {
      //const response = await fetch("/api/horoscope");
      // 絶対パスで指定すると、同じドメイン内の /api/horoscope を探しに行きます
      const response = await fetch("/api/horoscope");
      const data = await response.json();
      document.getElementById("result").innerText =
        `太陽: ${data.sun}\n月: ${data.moon}\nアセンダント: ${data.asc}`;
    } catch (error) {
      document.getElementById("result").innerText = "取得できませんでした";
      console.error(error);
    }
  }

  getHoroscope();
  </script>
</body>
</html>
