<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙計算機 - 全世界公開版</title>
    <style>
        body {
            background-color: #0d1b2a;
            color: #e0e1dd;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1b263b;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #4cc9f0; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background-color: #0d1b2a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background-color: #4cc9f0;
            color: #0d1b2a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #4361ee; color: white; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #0d1b2a;
            border-radius: 8px;
            min-height: 50px;
            line-height: 1.6;
        }
        .coord-group { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>宇宙計算機</h1>
    
    <label>生年月日</label>
    <input type="date" id="date" value="1993-01-22">
    
    <label>誕生時刻</label>
    <input type="time" id="time" value="09:06">
    
    <div class="coord-group">
        <div>
            <label>緯度</label>
            <input type="number" id="lat" value="43.06" step="0.01">
        </div>
        <div>
            <label>経度</label>
            <input type="number" id="lng" value="141.35" step="0.01">
        </div>
    </div>

    <button onclick="calculate()">ネイタルチャートを計算</button>

    <div id="result">ここに結果が表示されます</div>
</div>

<script>
async function calculate() {
    const resDiv = document.getElementById('result');
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const lat = document.getElementById('lat').value;
    const lng = document.getElementById('lng').value;

    if (!date || !time) {
        resDiv.innerHTML = "日付と時刻を入力してください。";
        return;
    }

    try {
        resDiv.innerHTML = "🌟 宇宙の配置を計算中...";
        
        // RailwayのAPIを呼び出す（相対パスでOK）
        const resp = await fetch(`/api/horoscope?date=${date}&time=${time}&lat=${lat}&lng=${lng}`);
        
        if (!resp.ok) {
            throw new Error('サーバーエラーが発生しました');
        }
        
        const data = await resp.json();

        if (data.error) {
            resDiv.innerHTML = "計算エラー: " + data.error;
            return;
        }

        // 結果を画面に表示
        resDiv.innerHTML = `
            <div style="text-align: left; padding: 5px;">
                ☀️ 太陽: <strong>${data.sunPos}</strong><br>
                🌙 月: <strong>${data.moonPos}</strong><br>
                ♂️ 火星: <strong>${data.marsPos}</strong><br>
                ⬆️ ASC: <strong>${data.ascPos}</strong>
            </div>
        `;
    } catch (error) {
        console.error('Error:', error);
        resDiv.innerHTML = "通信に失敗しました。サーバーのビルド完了を待ってから再試行してください。";
    }
}
</script>

</body>
</html>
