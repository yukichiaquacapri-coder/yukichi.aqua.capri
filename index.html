<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>星のチケット発行所</title>
<style>
  body { font-family: sans-serif; padding: 20px; background-color: #f7f3f9; color: #333; }
  h1 { color: #5c3d7c; }
  input, button { margin: 5px 0; padding: 5px; font-size: 1rem; }
  button { cursor: pointer; background-color: #5c3d7c; color: white; border: none; border-radius: 5px; }
  #result { margin-top: 15px; white-space: pre-line; font-weight: bold; }
</style>
</head>

<body>

<h1>星のチケット発行所</h1>

<p>誕生日</p>
<input type="date" id="birthday">

<p>出生時間</p>
<input type="time" id="birthtime">

<p>出生地</p>
<input type="text" id="birthplace" placeholder="Tokyo">

<br><br>

<button onclick="showData()">チケット表示</button>

<p id="result"></p>

<script>
// 太陽星座の簡易計算（境界はざっくり）
function getSunSign(month, day) {
  const zodiac = [
    { sign: "Capricorn", end: 19 },
    { sign: "Aquarius", end: 18 },
    { sign: "Pisces", end: 20 },
    { sign: "Aries", end: 19 },
    { sign: "Taurus", end: 20 },
    { sign: "Gemini", end: 20 },
    { sign: "Cancer", end: 22 },
    { sign: "Leo", end: 22 },
    { sign: "Virgo", end: 22 },
    { sign: "Libra", end: 22 },
    { sign: "Scorpio", end: 21 },
    { sign: "Sagittarius", end: 21 }
  ];
  return day > zodiac[month-1].end
    ? zodiac[month % 12].sign
    : zodiac[month-1].sign;
}

function showData() {
  let birthdate = document.getElementById("birthday").value;
  let birthtime = document.getElementById("birthtime").value;
  let birthplace = document.getElementById("birthplace").value;

  let sunSign = "";
  if (birthdate) {
    const parts = birthdate.split("-");
    const month = parseInt(parts[1],10);
    const day = parseInt(parts[2],10);
    sunSign = getSunSign(month, day);
  }

  document.getElementById("result").innerText =
    "誕生日: " + birthdate +
    "\n出生時間: " + birthtime +
    "\n出生地: " + birthplace +
    (sunSign ? "\n太陽星座: " + sunSign : "");
}
</script>

</body>
</html>
