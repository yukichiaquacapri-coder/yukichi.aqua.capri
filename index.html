<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cosmic Calculator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 40px 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; display: inline-block; max-width: 400px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { color: var(--accent); }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 30px; padding: 20px; background: rgba(56,189,248,0.1); border-radius: 12px; text-align: left; line-height: 2; }
    </style>
</head>
<body>
    <h1>宇宙計算機</h1>
    <div class="container">
        <input type="date" id="date" value="1993-01-22">
        <input type="time" id="time" value="09:06">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="lat" placeholder="緯度" step="0.01" value="43.06">
            <input type="number" id="lng" placeholder="経度" step="0.01" value="141.35">
        </div>
        <button onclick="calculate()">ネイタルチャートを計算</button>
        <div id="result">ここに結果が表示されます</div>
    </div>
    <script>
        async function calculate() {
            const resDiv = document.getElementById('result');
            const params = new URLSearchParams({
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value
            });
            resDiv.innerText = "星の位置を計算中...";
            try {
                const response = await fetch(`/api/horoscope?${params}`);
                const data = await response.json();
                // 裏側のAPIが返す名前(sunPos, moonPos, ascPos)に厳密に合わせます
                resDiv.innerHTML = `☀️ 太陽: <strong>${data.sunPos}</strong><br>🌙 月: <strong>${data.moonPos}</strong><br>♂️ 火星: <strong>${data.marsPos}</strong><br>⬆️ ASC: <strong>${data.ascPos}</strong>`;
                resDiv.innerText = "計算失敗。もう一度試してね！";
            }
        }
    </script>
</body>
</html>
