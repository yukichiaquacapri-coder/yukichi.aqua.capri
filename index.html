<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukichi's Portal & Cosmic Calculator</title>
    <style>
        body {
            background-color: #0d1b2a;
            color: #e0e1dd;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            padding: 20px;
        }
        .container {
            background-color: #1b263b;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { color: #4cc9f0; margin-bottom: 1rem; font-size: 1.5rem; }
        h2 { color: #a2d2ff; font-size: 1.2rem; margin-top: 0; }
        
        /* リンク集のスタイル */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #415a77;
        }
        .btn-link {
            display: block;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            background-color: #415a77;
            color: white;
        }
        .btn-link:hover { background-color: #778da9; }
        .btn-steam { background-color: #171a21; border: 1px solid #66c0f4; }
        .btn-steam:hover { background-color: #2a475e; }

        /* 計算機のスタイル */
        label { display: block; text-align: left; margin-top: 10px; font-size: 0.9rem; color: #a2d2ff; }
        input {
            width: 100%;
            padding: 12px;
            margin: 5px 0 15px 0;
            border-radius: 8px;
            border: none;
            background-color: #0d1b2a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .coord-group { display: flex; gap: 10px; }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background-color: #4cc9f0;
            color: #0d1b2a;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background-color: #4361ee; color: white; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #0d1b2a;
            border-radius: 8px;
            min-height: 60px;
            text-align: left;
            line-height: 1.8;
            border-left: 4px solid #4cc9f0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Yukichi's Works</h1>
    
    <div class="links">
        <a href="YOUR_STEAM_URL_HERE" target="_blank" class="btn-link btn-steam">🎮 Steam: 7 Days Later...</a>
        <a href="https://www.tiktok.com/" target="_blank" class="btn-link">📱 TikTok / Design</a>
    </div>

    <h2>宇宙計算機</h2>
    
    <label>生年月日</label>
    <input type="date" id="date" value="1993-01-22">
    
    <label>誕生時刻</label>
    <input type="time" id="time" value="09:06">
    
    <div class="coord-group">
        <div style="flex: 1;">
            <label>緯度</label>
            <input type="number" id="lat" value="43.06" step="0.01">
        </div>
        <div style="flex: 1;">
            <label>経度</label>
            <input type="number" id="lng" value="141.35" step="0.01">
        </div>
    </div>

    <button onclick="calculate()">ネイタルチャートを計算</button>

    <div id="result">生年月日を入力して計算してください</div>
</div>

<script>
async function calculate() {
    const resDiv = document.getElementById('result');
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const lat = document.getElementById('lat').value;
    const lng = document.getElementById('lng').value;

    if (!date || !time) {
        resDiv.innerHTML = "❌ 日付と時刻を入力してください。";
        return;
    }

    resDiv.innerHTML = "⏳ 宇宙の配置を計算中...";

    try {
        // あなたのRailwayサーバーのURL
        const resp = await fetch(`https://yukichiaquacapri-production.up.railway.app/api/horoscope?date=${date}&time=${time}&lat=${lat}&lng=${lng}&offset=-540`);
        
        if (!resp.ok) throw new Error('サーバーエラーが発生しました');
        
        const data = await resp.json();

        // 画面への表示（各天体のステータスとスコアを表示）
        resDiv.innerHTML = `
            <div style="color:#ff00ff; font-weight:bold; margin-bottom:10px;">🌓 ${data.sect}</div>
            ☀️ 太陽: <strong>${data.sun.pos}</strong> <small>(${data.sun.status} Score:${data.sun.score})</small><br>
            🌙 月: <strong>${data.moon.pos}</strong> <small>(${data.moon.status} Score:${data.moon.score})</small><br>
            ♂️ 火星: <strong>${data.mars.pos}</strong> <small>(${data.mars.status} Score:${data.mars.score})</small><br>
            🍀 PoF: <strong>${data.pof}</strong><br>
            ⬆️ ASC: <strong>${data.asc}</strong>
        `;
    } catch (e) {
        resDiv.innerHTML = "❌ 通信に失敗しました。";
        console.error(e);
    }
}
</script>

</body>
</html>
